<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Password Generator</title>
</head>

<body>
    <h1>Randomly Generate Password</h1>

    <label for="passwordLength">Enter Password Length: </label>
    <input type="number" name="passwordLength" id="passwordLength">
    <br>
    <br>

    <button onclick="generatePassword()">Generate Password</button>

    <h3 id="result"></h3>

    <script>
        function generatePassword() {
            let pLength = parseInt(document.getElementById("passwordLength").value);

            let passwordCharacters = "abcdefghijklmnopqrstuvwxyzABCDEFGHIJKLMNOPQRSTUVWXYZ`~!@#$%^&*()_+-={}|[]\:;'<>?,./1234567890";

            let password = "";

            for (let i = 0; i < pLength; i++) {
                let randomIndex = Math.floor(Math.random() * passwordCharacters.length);
                password += passwordCharacters.charAt(randomIndex);
            }

            document.getElementById("result").innerHTML = "Your generated password is as follows: " + password;
        }

    </script>
</body>

</html>
