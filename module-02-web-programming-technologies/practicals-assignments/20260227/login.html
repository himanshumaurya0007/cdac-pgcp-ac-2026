<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
            <a href="change_password.html">Change Password</a>
            <a href="about_us.html">About Us</a>
        </nav>
    </header>

    <main>
        <form style="margin: 18px 0;" action="/login.html" method="post">

            <label for="username">Username</label>
            <input type="text" id="username" name="username" minlength="2" maxlength="20" required>
            <br>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" minlength="2" maxlength="20" required>
            <br>

            <input type="submit" value="Login">
            <input type="reset" value="Reset">
        </form>

    </main>
</body>

</html>
