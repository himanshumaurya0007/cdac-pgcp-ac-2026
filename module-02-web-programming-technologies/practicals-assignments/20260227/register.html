<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
</head>

<body>
    <header>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
            <a href="change_password.html">Change Password</a>
            <a href="about_us.html">About Us</a>
        </nav>
    </header>

    <main>
        <!-- <form action="/register.html" method="post"> -->
        <form style="margin: 18px 0;" id="registerForm">

            <label for="firstName">First name</label>
            <input type="text" id="firstName" name="firstName" minlength="2" maxlength="20" required>
            <br>

            <label for="lastName">Last name</label>
            <input type="text" id="lastName" name="lastName" minlength="2" maxlength="20" required>
            <br>

            <label for="username">Username</label>
            <input type="text" id="username" name="username" minlength="2" maxlength="20" required>
            <br>

            <label for="gender">Gender</label>
            <br>

            <input type="radio" id="male" name="gender" value="male" checked>
            <label for="male">Male</label>
            <br>

            <input type="radio" id="female" name="gender" value="female">
            <label for="female">Female</label>
            <br>

            <label for="knownLanguages">Known languages</label>
            <br>
            <input type="checkbox" id="english" name="knownLanguages" value="english">
            <label for="english">English</label>
            <br>
            <input type="checkbox" id="hindi" name="knownLanguages" value="hindi">
            <label for="hindi">Hindi</label>
            <br>
            <input type="checkbox" id="marathi" name="knownLanguages" value="marathi">
            <label for="marathi">Marathi</label>
            <br>

            <label for="email">Email</label>
            <input type="email" id="email" name="email" required>
            <br>

            <label for="password">Password</label>
            <input type="password" id="password" name="password" required>
            <br>

            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" name="confirmPassword" required>
            <br>

            <input type="submit" value="Register">
            <input type="reset" value="Reset">
        </form>
    </main>

    <h2 style="margin: 18px 0;">Registered User Details</h2>

    <table border="1" id="resultTable" style="display:none;">
        <thead>
            <tr>
                <th>First Name</th>
                <th>Last Name</th>
                <th>Username</th>
                <th>Gender</th>
                <th>Languages</th>
                <th>Email</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>

    <script>
        const form = document.getElementById("registerForm");
        const table = document.getElementById("resultTable");
        const tbody = table.querySelector("tbody");

        form.addEventListener("submit", function (event) {

            // stop page reload
            event.preventDefault();

            // get values
            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;
            const username = document.getElementById("username").value;
            const email = document.getElementById("email").value;

            const gender = document.querySelector('input[name="gender"]:checked').value;

            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirmPassword").value;

            // password validation
            if (password !== confirmPassword) {
                alert("Passwords do not match!");
                return;
            }

            // get checked languages
            const languages = [];
            document.querySelectorAll('input[name="knownLanguages"]:checked')
                .forEach(cb => languages.push(cb.value));

            if (languages.length === 0) {
                alert("Select at least one language");
                return;
            }

            // create table row
            const row = document.createElement("tr");

            row.innerHTML = `
            <td>${firstName}</td>
            <td>${lastName}</td>
            <td>${username}</td>
            <td>${gender}</td>
            <td>${languages.join(", ")}</td>
            <td>${email}</td>
        `;

            tbody.appendChild(row);

            // show table
            table.style.display = "table";

            // reset form
            form.reset();
        });
    </script>
</body>

</html>
