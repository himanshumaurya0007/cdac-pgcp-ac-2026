<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <!-- Program 1 -->
    <h2>Fetch Data</h2>
    <button onclick="loadData()">Fetch Data</button>
    <br>
    <br>
    <div id="data"></div>

    <table border="1" id="displayTable" style="display:none;">
        <thead>
            <tr>
                <th style="padding: 13px 18px;">Id</th>
                <th style="padding: 13px 18px;">Title</th>
                <th style="padding: 13px 18px;">Price</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <br>
    <br>

    <!-- Program 3 -->
    <label for="username">Username</label>
    <input type="text" id="username" name="username" minlength="3" maxlength="20" required>
    <p id="displayErrorMessage"></p>

    <input type="button" value="check" onclick="validate()">
    <br>
    <br>
    <br>

    <!-- Program 4 -->
    <label for="id">Enter Student ID</label>
    <input type="number" id="id" name="id" minlength="3" maxlength="7" required>
    <br>
    <br>

    <label for="name">Enter Student Name</label>
    <input type="text" id="name" name="name" minlength="3" maxlength="15" required>
    <br>
    <br>

    <input type="submit" value="Save Data" onclick="saveStudentData()">
    <br>
    <br>

    <table border="1" id="studentDataTable">
        <thead>
            <tr>
                <th style="padding: 13px 18px;">TD</th>
                <th style="padding: 13px 18px;">Name</th>
            </tr>
        </thead>
        <tbody></tbody>
    </table>
    <br>
    <br>

    <!-- Program 5 -->
    <label for="dob">Enter your DOB</label>
    <input type="date" id="dob" name="dob" required>
    <br>
    <br>
    
    <input type="submit" value="Tell my age" onclick="calculateAge()">
    <br>
    <br>

    <p id="displayResult"></p>

    <script src="index.js"></script>
</body>

</html>
