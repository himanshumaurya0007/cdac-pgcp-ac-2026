<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Convertor</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
        }

        .container {
            width: 400px;
            margin: 100px auto;
            padding: 20px;
            border: 7px solid #333;
            background-color: #ffffff;
        }

        input,
        select,
        button {
            width: 100%;
            padding: 8px;
            margin: 8px 0;
        }

        input {
            width: 95%;
        }

        button {
            background-color: #007bff;
            color: white;
        }

        p {
            background-color: #222;
            color: #ffffff;
            padding: 10px;
            margin-top: 15px;
            text-align: center;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Currency Convertor</h2>

        <label>Enter Amount:</label>
        <input type="number" id="amount">

        <label>From:</label>
        <select id="fromCurrency">
            <option value="rupee" selected>Rupee</option>
            <option value="dollar">Dollar</option>
            <option value="euro">Euro</option>
        </select>

        <label>To:</label>
        <select id="toCurrency">
            <option value="rupee">Rupee</option>
            <option value="dollar" selected>Dollar</option>
            <option value="euro">Euro</option>
        </select>

        <button onclick="convertCurrency()">Convert</button>

        <p id="result">Converted amount will appear here</p>
    </div>

    <script>
        function convertCurrency() {
            const amount = parseFloat(document.getElementById("amount").value);
            const from = document.getElementById("fromCurrency").value;
            const to = document.getElementById("toCurrency").value;

            let result = 0;

            if (isNaN(amount)) {
                document.getElementById("result").innerText = "Please enter a valid amount";
                return;
            }

            // Conversion logic
            const rupeeToDollar = 1 / 80;
            const dollarToRupee = 80;

            // Convert source to Rupee first
            let amountInRupee;

            if (from === "rupee") {
                amountInRupee = amount;
            } else if (from === "dollar") {
                amountInRupee = amount * dollarToRupee;
            } else if (from === "euro") {
                amountInRupee = amount * 90; // Assume
            }

            // Convert Rupee to target
            if (to === "rupee") {
                result = amountInRupee;
            } else if (to === "dollar") {
                result = amountInRupee * rupeeToDollar;
            } else if (to === "euro") {
                result = amountInRupee / 90;
            }

            document.getElementById("result").innerText = "Converted Amount: " + result.toFixed(2);
        }
    </script>

</body>

</html>
